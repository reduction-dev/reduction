name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - test-release

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Get access to the shared protocol files for proto imports
      - name: Checkout Protocol
        uses: actions/checkout@v3
        with:
          repository: reduction/reduction-protocol
          path: reduction-protocol
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24.0'

      - name: Setup Tools
        run: ./scripts/setup

      - name: Generate Code
        env:
          PROTOCOL_PATH: ${{ github.workspace }}/reduction-protocol
        run: ./scripts/gen

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_REPO_TOKEN: ${{ secrets.HOMEBREW_REPO_TOKEN }}
